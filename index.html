<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B5B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bae Watch" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Viewport — iOS input zoom is prevented by 16px input font-size in CSS,
         so pinch-zoom stays enabled for accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO / Social -->
    <title>Bae Watch — Love Better. Notice More.</title>
    <meta name="description" content="A relationship companion app that helps couples stay deeply connected through daily check-ins, conversation coaching, and shared growth." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dist-jet-three-47.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dist-jet-three-47.vercel.app/" />
    <meta property="og:title" content="Bae Watch — Love Better. Notice More." />
    <meta property="og:description" content="A relationship companion that helps couples stay deeply connected through daily check-ins, conversation coaching, and shared growth." />
    <meta property="og:image" content="https://dist-jet-three-47.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bae Watch — Love Better. Notice More." />
    <meta name="twitter:description" content="A relationship companion that helps couples stay deeply connected and grow together." />
    <meta name="twitter:image" content="https://dist-jet-three-47.vercel.app/og-image.jpg" />

    <!-- Structured data -->

    {
      "@context": "https://schema.org",

      "name": "Bae Watch",
      "url": "https://dist-jet-three-47.vercel.app/",
      "description": "A relationship companion app that helps couples stay deeply connected through daily check-ins, conversation coaching, and shared growth.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
